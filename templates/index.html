<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Android Security Auditor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5f6fa;color:#222;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

  .card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:32px 36px;width:100%;max-width:460px;box-shadow:0 2px 8px rgba(0,0,0,.07)}

  .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .logo-icon{width:44px;height:44px;background:#1a1a2e;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo h1{font-size:1.2rem;font-weight:700;color:#1a1a2e}
  .logo p{font-size:12px;color:#888;margin-top:2px}

  .status-box{border:1px solid #e0e0e0;border-radius:8px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;background:#fafafa}
  .status-box.ok{border-color:#c3e6cb;background:#f0fff4}
  .status-box.fail{border-color:#f5c2c7;background:#fff5f5}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot.checking{background:#ffc107}
  .dot.connected{background:#28a745}
  .dot.disconnected{background:#dc3545}
  .status-text .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .status-text .value{font-size:13px;font-weight:600;color:#222}
  .status-text .value strong{color:#1a1a2e}

  .btn{width:100%;padding:14px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:background .2s}
  .btn:hover:not(:disabled){background:#2e3a5a}
  .btn:disabled{background:#ccc;cursor:not-allowed}

  .progress{display:none;margin-top:16px}
  .progress.on{display:block}
  .progress-bar{height:4px;background:#e9ecef;border-radius:4px;overflow:hidden;margin-bottom:10px}
  .progress-fill{height:100%;background:#1a1a2e;width:0%;transition:width .3s;border-radius:4px}
  .progress-log{height:80px;overflow-y:auto;background:#f8f8f8;border:1px solid #eee;border-radius:6px;padding:8px 10px;font-size:12px;color:#666}
  .progress-log p{margin:1px 0}
  .progress-log p::before{content:'› ';color:#aaa}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
  .step{background:#f8f8f8;border:1px solid #e9e9e9;border-radius:8px;padding:12px 10px;text-align:center}
  .step .num{font-size:1.1rem;font-weight:700;color:#ccc;margin-bottom:5px}
  .step p{font-size:11px;color:#888;line-height:1.4}

  .footer{margin-top:14px;font-size:11px;color:#bbb;text-align:center}
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">🔍</div>
    <div>
      <h1>Android Security Auditor</h1>
      <p>ADB-powered device analysis</p>
    </div>
  </div>

  <div class="status-box" id="statusBox">
    <span class="dot checking" id="statusDot"></span>
    <div class="status-text">
      <div class="label">Device Status</div>
      <div class="value" id="statusMsg">Checking for connected device...</div>
    </div>
  </div>

  <button class="btn" id="scanBtn" disabled onclick="startScan()">
    Start Security Scan
  </button>

  <div class="progress" id="progressWrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progBar"></div>
    </div>
    <div class="progress-log" id="progLog"></div>
  </div>

  <div class="steps">
    <div class="step"><div class="num">1</div><p>Enable USB Debugging in Developer Options</p></div>
    <div class="step"><div class="num">2</div><p>Connect phone via USB and tap Allow</p></div>
    <div class="step"><div class="num">3</div><p>Click scan and wait ~30 seconds</p></div>
  </div>

</div>

<div class="footer">Local only · No data leaves your device · v3.0</div>

<script>
let pc = 0;

async function checkDevice() {
  try {
    const d = await (await fetch('/api/check-device')).json();
    const dot = document.getElementById('statusDot');
    const msg = document.getElementById('statusMsg');
    const btn = document.getElementById('scanBtn');
    const box = document.getElementById('statusBox');

    if (d.connected) {
      dot.className = 'dot connected';
      msg.innerHTML = `Connected — <strong>${d.device_line || 'Android Device'}</strong>`;
      btn.disabled = false;
      box.className = 'status-box ok';
    } else {
      dot.className = 'dot disconnected';
      msg.textContent = d.error || 'No device found. Connect via USB.';
      btn.disabled = true;
      box.className = 'status-box fail';
      setTimeout(checkDevice, 3000);
    }
  } catch(e) {
    document.getElementById('statusMsg').textContent = 'ADB not reachable. Is server running?';
  }
}

async function startScan() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';

  const pw = document.getElementById('progressWrap');
  pw.classList.add('on');
  document.getElementById('progLog').innerHTML = '';
  pc = 0;

  await fetch('/api/start-audit');

  const es = new EventSource('/api/progress');
  es.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.msg === '__DONE__') {
      es.close();
      document.getElementById('progBar').style.width = '100%';
      setTimeout(() => window.location.href = '/report', 400);
      return;
    }
    pc++;
    const line = document.createElement('p');
    line.textContent = data.msg;
    const log = document.getElementById('progLog');
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    document.getElementById('progBar').style.width = Math.min(95, pc * 0.9) + '%';
  };
}

checkDevice();
</script>
</body>
</html>
