<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Android Security Auditor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #020810;
      --panel:  #07111e;
      --border: #0a1e32;
      --accent: #00e5ff;
      --green:  #39ff14;
      --red:    #ff1744;
      --amber:  #ffd600;
      --purple: #7b61ff;
      --pink:   #ff3d71;
      --dim:    #1e3a4a;
      --text:   #a8c8d8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── NOISE TEXTURE ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px;
      opacity: .5;
    }

    /* ── AURORA BACKGROUND ─────────────────────────── */
    .aurora {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: auroraPulse linear infinite;
    }
    .aurora-blob:nth-child(1) {
      width: 600px; height: 400px; top: -100px; left: -100px;
      background: radial-gradient(ellipse, rgba(0,229,255,.06), transparent 70%);
      animation-duration: 12s; animation-delay: 0s;
    }
    .aurora-blob:nth-child(2) {
      width: 500px; height: 350px; top: 20%; right: -80px;
      background: radial-gradient(ellipse, rgba(123,97,255,.05), transparent 70%);
      animation-duration: 15s; animation-delay: -4s;
    }
    .aurora-blob:nth-child(3) {
      width: 450px; height: 300px; bottom: -50px; left: 30%;
      background: radial-gradient(ellipse, rgba(255,61,113,.04), transparent 70%);
      animation-duration: 10s; animation-delay: -7s;
    }
    @keyframes auroraPulse {
      0%,100% { opacity:0; transform: scale(.8) translate(0,0); }
      50%      { opacity:1; transform: scale(1.1) translate(20px,-15px); }
    }

    /* ── SPOTLIGHT ─────────────────────────────────── */
    .spotlight {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(circle 450px at var(--mx,-999px) var(--my,-999px),
        rgba(0,229,255,.055) 0%, transparent 100%);
      transition: background .06s;
    }

    /* ── SCANLINE ──────────────────────────────────── */
    .scanline {
      position: fixed; top: -4px; left: 0; right: 0;
      height: 4px; z-index: 9990; pointer-events: none;
      background: linear-gradient(transparent, rgba(0,229,255,.1) 40%, rgba(0,229,255,.1) 60%, transparent);
      animation: scanDown 7s linear infinite;
    }
    @keyframes scanDown { to { top: 110vh; } }

    /* ── HUD CORNERS ───────────────────────────────── */
    .hud-c {
      position: fixed; width: 44px; height: 44px;
      border-color: rgba(0,229,255,.22); border-style: solid;
      pointer-events: none; z-index: 2;
      transition: border-color .3s;
    }
    .hud-c.tl { top:16px;    left:16px;  border-width:1.5px 0 0 1.5px; }
    .hud-c.tr { top:16px;    right:16px; border-width:1.5px 1.5px 0 0; }
    .hud-c.bl { bottom:16px; left:16px;  border-width:0 0 1.5px 1.5px; }
    .hud-c.br { bottom:16px; right:16px; border-width:0 1.5px 1.5px 0; }
    /* Pulse corner dots */
    .hud-c::before {
      content: '';
      position: absolute;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: dotBlink 2.5s ease infinite;
    }
    .hud-c.tl::before { top:-2px;    left:-2px;  }
    .hud-c.tr::before { top:-2px;    right:-2px; }
    .hud-c.bl::before { bottom:-2px; left:-2px;  }
    .hud-c.br::before { bottom:-2px; right:-2px; }
    @keyframes dotBlink { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── CANVAS ────────────────────────────────────── */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }


    /* ── FULL-SCREEN CROSSHAIR ─────────────────── */
    .ch { position:fixed; pointer-events:none; z-index:9996; }
    #chH {
      left:0; right:0; height:1px;
      background:linear-gradient(90deg,
        transparent 0%,
        rgba(0,229,255,.05) 10%,
        rgba(0,229,255,.2) 40%,
        rgba(0,229,255,.2) 60%,
        rgba(0,229,255,.05) 90%,
        transparent 100%);
    }
    #chV {
      top:0; bottom:0; width:1px;
      background:linear-gradient(180deg,
        transparent 0%,
        rgba(0,229,255,.05) 10%,
        rgba(0,229,255,.2) 40%,
        rgba(0,229,255,.2) 60%,
        rgba(0,229,255,.05) 90%,
        transparent 100%);
    }

    /* ── CURSOR HUD ───────────────────────────── */
    .cur-hud {
      position:fixed; z-index:10003; pointer-events:none;
      font-family:'Share Tech Mono',monospace;
      font-size:.58rem; line-height:1.5;
      color:rgba(0,229,255,.45); letter-spacing:.5px;
      transform:translate(14px,-20px);
      white-space:nowrap;
      text-shadow:0 0 8px rgba(0,229,255,.3);
    }
    .cur-hud span { display:block; }

    /* ── BUTTON CORNER BRACKETS ───────────────── */
    .btn-brackets {
      position:absolute; inset:-6px; pointer-events:none;
      opacity:0; transition:opacity .2s;
    }
    .btn-brackets span {
      position:absolute; width:10px; height:10px;
      border-color:rgba(0,229,255,.7); border-style:solid;
      transition:all .22s cubic-bezier(.34,1.56,.64,1);
    }
    .btn-brackets span:nth-child(1) { top:0;    left:0;  border-width:1.5px 0 0 1.5px; transform:translate(5px,5px); }
    .btn-brackets span:nth-child(2) { top:0;    right:0; border-width:1.5px 1.5px 0 0; transform:translate(-5px,5px); }
    .btn-brackets span:nth-child(3) { bottom:0; left:0;  border-width:0 0 1.5px 1.5px; transform:translate(5px,-5px); }
    .btn-brackets span:nth-child(4) { bottom:0; right:0; border-width:0 1.5px 1.5px 0; transform:translate(-5px,-5px); }
    .btn-wrap:hover .btn-brackets { opacity:1; }
    .btn-wrap:hover .btn-brackets span { transform:translate(0,0); }

    /* ── CURSOR VELOCITY GLOW ─────────────────── */
    .cur-dot { transition:background .12s, box-shadow .12s; }

    /* ── TARGETING RETICLE CURSOR ──────────────────── */
    .cur-reticle {
      position: fixed; z-index: 10001;
      width: 40px; height: 40px;
      transform: translate(-50%,-50%);
      pointer-events: none;
      transition: width .18s cubic-bezier(.25,.46,.45,.94),
                  height .18s, opacity .2s;
    }
    .cur-corner {
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(0,229,255,.85);
      border-style: solid;
      transition: all .18s cubic-bezier(.25,.46,.45,.94);
    }
    .cur-corner.tl { top:0; left:0;   border-width:2px 0 0 2px; }
    .cur-corner.tr { top:0; right:0;  border-width:2px 2px 0 0; }
    .cur-corner.bl { bottom:0; left:0;  border-width:0 0 2px 2px; }
    .cur-corner.br { bottom:0; right:0; border-width:0 2px 2px 0; }

    .cur-reticle.hover .cur-corner { width:7px; height:7px; border-color:rgba(0,229,255,1); }
    .cur-reticle.hover { width:52px; height:52px; }

    .cur-reticle.pressing .cur-corner { width:4px; height:4px; }
    .cur-reticle.pressing { width:24px; height:24px; }

    .cur-dot {
      position: fixed; z-index: 10002;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .cur-dot.pressing { background: #fff; transform: translate(-50%,-50%) scale(2); }

    .cur-trail {
      position: fixed; z-index: 9999;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); transform: translate(-50%,-50%);
      pointer-events: none;
    }

    /* ── SHOCKWAVE ─────────────────────────────────── */
    .shockwave {
      position: fixed;
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid rgba(0,229,255,.9);
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 9998;
      animation: shockOut .6s cubic-bezier(0,.55,.45,1) forwards;
    }
    .shockwave.d1 { animation-delay:.06s; border-color:rgba(0,229,255,.5); width:4px; height:4px; }
    .shockwave.d2 { animation-delay:.13s; border-color:rgba(123,97,255,.4); width:4px; height:4px; }
    @keyframes shockOut { to { width:200px; height:200px; opacity:0; border-width:.5px; } }

    /* ── CONTENT ───────────────────────────────────── */
    .content {
      position: relative; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px 80px;
      width: 100%; gap: 0;
    }

    /* ── HERO ──────────────────────────────────────── */
    .hero { text-align: center; margin-bottom: 36px; }

    .logo-stack {
      position: relative; width: 100px; height: 100px;
      margin: 0 auto 26px;
    }

    /* Outer ring 1 */
    .logo-stack svg.ring1 {
      position: absolute; inset: 0; width: 100%; height: 100%;
      animation: spin1 6s linear infinite;
    }
    /* Outer ring 2 */
    .logo-stack svg.ring2 {
      position: absolute; inset: 6px; width: calc(100% - 12px); height: calc(100% - 12px);
      animation: spin1 10s linear infinite reverse;
    }

    @keyframes spin1 { to { transform: rotate(360deg); } }

    .logo-core {
      position: absolute; inset: 18px; border-radius: 50%;
      background: linear-gradient(135deg, #0066cc, var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow:
        0 0 0 1px rgba(0,229,255,.3),
        0 0 30px rgba(0,229,255,.5),
        0 0 70px rgba(0,229,255,.2),
        inset 0 0 20px rgba(0,0,0,.3);
      animation: corePulse 2.5s ease infinite;
    }
    @keyframes corePulse {
      0%,100% { box-shadow: 0 0 0 1px rgba(0,229,255,.3), 0 0 30px rgba(0,229,255,.5), 0 0 70px rgba(0,229,255,.2); }
      50%      { box-shadow: 0 0 0 1px rgba(0,229,255,.5), 0 0 60px rgba(0,229,255,.8), 0 0 120px rgba(0,229,255,.35); }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.5rem, 4vw, 2.9rem);
      font-weight: 900; letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent) 0%, var(--purple) 50%, var(--accent) 100%);
      background-size: 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
      filter: drop-shadow(0 0 20px rgba(0,229,255,.3));
      margin-bottom: 12px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem; color: var(--dim);
      letter-spacing: 5px; text-transform: uppercase;
      min-height: 1.2em;
    }

    /* ── CARD WRAPPER (animated border) ────────────── */
    .card-wrapper {
      position: relative;
      width: min(520px, calc(100vw - 32px));
      border-radius: 22px;
      padding: 1.5px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .card-wrapper::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 300%; height: 300%;
      transform: translate(-50%,-50%);
      background: conic-gradient(from 0deg,
        rgba(0,229,255,0) 0deg,
        rgba(0,229,255,.7) 60deg,
        rgba(123,97,255,.7) 140deg,
        rgba(255,61,113,.5) 220deg,
        rgba(0,229,255,.7) 300deg,
        rgba(0,229,255,0) 360deg);
      animation: borderSpin 4s linear infinite;
      pointer-events: none;
    }
    @keyframes borderSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── STATUS CARD ───────────────────────────────── */
    .status-card {
      position: relative; z-index: 1;
      background: var(--panel);
      border-radius: 20px;
      padding: 30px 34px;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    /* Holographic shimmer overlay */
    .card-shine {
      position: absolute; inset: 0; border-radius: 20px;
      pointer-events: none; z-index: 2; opacity: 0;
      transition: opacity .15s;
      mix-blend-mode: overlay;
    }

    /* Scan beam (appears on device connect) */
    .scan-beam {
      position: absolute; left: 0; right: 0; height: 2px; top: -4px;
      background: linear-gradient(90deg, transparent 0%, rgba(57,255,20,.8) 50%, transparent 100%);
      box-shadow: 0 0 12px rgba(57,255,20,.6);
      animation: beamDown .7s ease forwards;
      pointer-events: none; z-index: 5;
    }
    @keyframes beamDown { to { top: 100%; } }

    .card-inner { position: relative; z-index: 3; }

    /* ── DEVICE ROW ────────────────────────────────── */
    .device-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.4);
      margin-bottom: 22px;
      transition: border-color .4s, box-shadow .4s, background .4s;
    }
    .device-row.found {
      border-color: rgba(57,255,20,.35);
      background: rgba(57,255,20,.04);
      box-shadow: 0 0 20px rgba(57,255,20,.08);
    }
    .device-row.missing { border-color: rgba(255,23,68,.25); }

    .status-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .status-dot.checking {
      background: var(--amber); box-shadow: 0 0 8px var(--amber);
      animation: dotBlink 1s ease infinite;
    }
    .status-dot.connected {
      background: var(--green);
      box-shadow: 0 0 12px var(--green), 0 0 24px rgba(57,255,20,.3);
      animation: connPulse 2s ease infinite;
    }
    .status-dot.disconnected { background: var(--red); box-shadow: 0 0 8px var(--red); }
    @keyframes connPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

    .status-text { flex: 1; }
    .status-label { font-size: .65rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
    .status-value { font-family: 'Share Tech Mono', monospace; font-size: .88rem; }
    .status-value strong { color: var(--accent); }

    /* ── BUTTON WRAP (magnetic) ────────────────────── */
    .btn-wrap { position: relative; transition: transform .4s cubic-bezier(.34,1.56,.64,1); }

    /* ── SCAN BUTTON ───────────────────────────────── */
    .btn-scan {
      width: 100%; padding: 18px;
      background: transparent;
      border: 1px solid rgba(0,229,255,.3);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: .78rem; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      position: relative; overflow: hidden;
      transition: color .2s, border-color .2s, box-shadow .2s;
    }

    .btn-scan::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,229,255,0), rgba(0,229,255,.12), rgba(0,229,255,0));
      transform: translateX(-110%) skewX(-20deg);
      transition: transform 0s;
      pointer-events: none;
    }

    .btn-scan:not(:disabled):hover {
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 30px rgba(0,229,255,.3), inset 0 0 20px rgba(0,229,255,.05);
    }
    .btn-scan:not(:disabled):hover::before {
      transform: translateX(210%) skewX(-20deg);
      transition: transform .55s ease;
    }

    /* Energy fill on active/scanning */
    .btn-energy {
      position: absolute; inset: 0; border-radius: 12px;
      background: linear-gradient(90deg, rgba(0,229,255,.2) 0%, rgba(0,229,255,.05) 100%);
      transform: scaleX(0); transform-origin: left;
      transition: transform .4s ease;
      pointer-events: none;
    }

    .btn-scan.scanning .btn-energy { transform: scaleX(1); }
    .btn-scan.scanning { color: #fff; border-color: var(--accent); }

    .btn-scan:disabled:not(.scanning) { opacity: .35; }

    /* Spinning ring when scanning */
    .scan-ring-btn {
      position: absolute; inset: -2px; border-radius: 13px;
      border: 1.5px solid transparent;
      border-top-color: rgba(0,229,255,.8);
      border-right-color: rgba(0,229,255,.3);
      animation: spin1 1s linear infinite;
      display: none; pointer-events: none;
    }
    .scanning .scan-ring-btn { display: block; }

    /* ── PROGRESS ──────────────────────────────────── */
    .progress-wrap { display: none; margin-top: 20px; }
    .progress-wrap.active { display: block; }

    .progress-track { height: 2px; background: rgba(255,255,255,.05); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      border-radius: 2px; transition: width .3s;
      animation: pgShimmer 1.5s linear infinite; background-size: 200%;
    }
    @keyframes pgShimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    .progress-log {
      font-family: 'Share Tech Mono', monospace; font-size: .74rem;
      color: var(--dim); height: 86px; overflow-y: auto;
      padding: 10px 12px; background: rgba(0,0,0,.5);
      border-radius: 8px; border: 1px solid var(--border);
      scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
    }
    .progress-log .log-line { margin: 2px 0; animation: logSlide .15s ease; }
    .progress-log .log-line::before { content: '> '; color: rgba(0,229,255,.3); }
    .progress-log .log-line.ok   { color: var(--green); }
    .progress-log .log-line.warn { color: var(--amber); }
    .progress-log .log-line.info { color: var(--accent); }
    @keyframes logSlide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }

    /* ── STEPS ─────────────────────────────────────── */
    .steps {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 11px; width: min(520px, calc(100vw - 32px));
    }

    .step {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 14px 16px; text-align: center;
      position: relative; overflow: hidden;
      transition: border-color .3s, transform .3s, box-shadow .3s;
      transform-style: preserve-3d;
    }
    .step::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0,229,255,.08), transparent 65%);
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .step:hover { border-color: rgba(0,229,255,.22); transform: translateY(-5px) perspective(400px); box-shadow: 0 14px 30px rgba(0,0,0,.5); }
    .step:hover::after { opacity: 1; }

    .step-num {
      font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900;
      line-height: 1; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      opacity: .45;
    }
    .step p { font-size: .75rem; color: var(--dim); line-height: 1.45; }

    /* ── SYSTEM STATUS BAR ─────────────────────────── */
    .sys-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 4;
      background: rgba(7,17,30,.9); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 30px; padding: 8px 20px; height: 36px;
    }

    .sys-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem; color: var(--dim);
      display: flex; align-items: center; gap: 7px;
      letter-spacing: 1px;
    }
    .sys-led {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: dotBlink 2s ease infinite;
    }
    .sys-led.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .sys-val { color: var(--accent); }

    @media (max-width: 480px) {
      .steps { grid-template-columns: 1fr; }
      .sys-bar { display: none; }
    }
  </style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="spotlight" id="spotlight"></div>
<div class="scanline"></div>

<div class="hud-c tl"></div>
<div class="hud-c tr"></div>
<div class="hud-c bl"></div>
<div class="hud-c br"></div>

<canvas id="bgCanvas"></canvas>

<!-- Crosshair -->
<div class="ch" id="chH"></div>
<div class="ch" id="chV"></div>
<!-- Cursor HUD -->
<div class="cur-hud" id="curHud">
  <span id="hudX">X:0000</span>
  <span id="hudY">Y:0000</span>
</div>


<!-- Targeting reticle cursor -->
<div class="cur-reticle" id="curReticle">
  <div class="cur-corner tl"></div>
  <div class="cur-corner tr"></div>
  <div class="cur-corner bl"></div>
  <div class="cur-corner br"></div>
</div>
<div class="cur-dot" id="curDot"></div>

<div class="content">

  <div class="hero">
    <div class="logo-stack">
      <svg class="ring1" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="47" stroke="rgba(0,229,255,0.25)" stroke-width="1" stroke-dasharray="3 8"/>
      </svg>
      <svg class="ring2" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="44" cy="44" r="41" stroke="rgba(123,97,255,0.2)" stroke-width="1" stroke-dasharray="6 4"/>
      </svg>
      <div class="logo-core">🔍</div>
    </div>
    <h1 id="mainTitle">Android Auditor</h1>
    <p class="subtitle" id="subtitle"></p>
  </div>

  <!-- Animated border wrapper -->
  <div class="card-wrapper">
    <div class="status-card" id="statusCard">
      <div class="card-shine" id="cardShine"></div>
      <div class="card-inner">

        <div class="device-row" id="deviceStatus">
          <span class="status-dot checking" id="statusDot"></span>
          <div class="status-text">
            <div class="status-label">Device Connection</div>
            <div class="status-value" id="statusMsg">Scanning for connected device…</div>
          </div>
        </div>

        <div class="btn-wrap" id="btnWrap">
          <button class="btn-scan" id="scanBtn" disabled onclick="startScan()">
            <div class="btn-energy"></div>
            <span id="btnText">◉ &nbsp; INITIATE SECURITY SCAN</span>
          </button>
          <div class="scan-ring-btn"></div>
        </div>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-track"><div class="progress-fill" id="progBar"></div></div>
          <div class="progress-log" id="progLog"></div>
        </div>

      </div>
    </div>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">01</div>
      <p>Enable USB Debugging in Developer Options</p>
    </div>
    <div class="step">
      <div class="step-num">02</div>
      <p>Connect Android via USB &amp; authorize ADB</p>
    </div>
    <div class="step">
      <div class="step-num">03</div>
      <p>Hit Scan — full deep report ready in seconds</p>
    </div>
  </div>

</div>

<!-- System status bar -->
<div class="sys-bar">
  <div class="sys-item"><div class="sys-led"></div> ADB <span class="sys-val" id="sysAdb">READY</span></div>
  <div class="sys-item"><div class="sys-led"></div> MODE <span class="sys-val">LOCAL</span></div>
  <div class="sys-item"><div class="sys-led amber"></div> DEVICE <span class="sys-val" id="sysDev">SCANNING</span></div>
  <div class="sys-item"><div class="sys-led"></div> ENC <span class="sys-val">AES-256</span></div>
  <div class="sys-item"><div class="sys-led"></div> v2.1 <span class="sys-val" id="sysTime"></span></div>
</div>

<script>
/* ─── CANVAS ─────────────────────────────────────────── */
const canvas = document.getElementById('bgCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
const mouse = { x: -999, y: -999 };

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

class Particle {
  constructor() { this.init(); }
  init() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - .5) * .5;
    this.vy = (Math.random() - .5) * .5;
    this.r  = Math.random() * 1.6 + .3;
    this.a  = Math.random() * .4 + .1;
    this.flees = Math.random() > .25; // 75% flee, 25% orbit
  }
  update() {
    const ddx = mouse.x - this.x, ddy = mouse.y - this.y;
    const d   = Math.hypot(ddx, ddy);
    if (d < 160 && d > 1) {
      const nx = ddx/d, ny = ddy/d;  // toward mouse
      const tx = -ny,   ty = nx;     // tangential (orbit direction)
      const pull = (160-d)/160;
      if (this.flees) {
        // Outer ring: orbit + gentle repel
        this.vx += tx * pull * .7 - nx * pull * .3;
        this.vy += ty * pull * .7 - ny * pull * .3;
      } else {
        // Inner ring: tighter orbit with pull
        this.vx += tx * pull * 1.1 + nx * pull * .15;
        this.vy += ty * pull * 1.1 + ny * pull * .15;
      }
      if (d < 30) { this.vx -= nx*4; this.vy -= ny*4; } // bounce at center
    }
    this.vx *= .965; this.vy *= .965;
    this.x += this.vx; this.y += this.vy;
    if (this.x < -10) this.x = W + 10;
    if (this.x > W+10) this.x = -10;
    if (this.y < -10) this.y = H + 10;
    if (this.y > H+10) this.y = -10;
  }
  draw() {
    const d = Math.hypot(this.x - mouse.x, this.y - mouse.y);
    const n = Math.max(0, 1 - d / 120);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r + n * 2, 0, Math.PI * 2);
    ctx.fillStyle = this.flees
      ? `rgba(0,229,255,${this.a + n * .55})`
      : `rgba(123,97,255,${this.a + n * .5})`;
    ctx.fill();
  }
}

let particles = [];

function drawHexGrid() {
  const size = 36, h = size * Math.sqrt(3);
  ctx.strokeStyle = 'rgba(0,229,255,0.025)';
  ctx.lineWidth = .5;
  for (let row = -1; row < H / h + 2; row++) {
    for (let col = -1; col < W / (size * 1.5) + 2; col++) {
      const x = col * size * 1.5;
      const y = row * h + (col % 2 === 0 ? 0 : h / 2);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 180 * (60 * i - 30);
        const px = x + size * Math.cos(angle);
        const py = y + size * Math.sin(angle);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function connectParticles() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.hypot(dx, dy);
      if (d < 110) {
        const a = (1 - d / 110) * .12;
        const grd = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
        grd.addColorStop(0, `rgba(0,229,255,${a})`);
        grd.addColorStop(1, `rgba(123,97,255,${a})`);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = grd;
        ctx.lineWidth   = .6;
        ctx.stroke();
      }
    }
  }
}

/* Electric arcs between particles near cursor */
function drawArcs() {
  const near = particles.filter(p => Math.hypot(p.x-mouse.x, p.y-mouse.y) < 95);
  for(let i=0;i<near.length;i++) {
    for(let j=i+1;j<near.length;j++) {
      const d = Math.hypot(near[i].x-near[j].x, near[i].y-near[j].y);
      if(d < 60) {
        const alpha = (1-d/60) * .75;
        ctx.save();
        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,255,255,${alpha})`;
        ctx.lineWidth   = .5 + (1-d/60) * 1.2;
        ctx.shadowColor = 'rgba(0,229,255,.8)';
        ctx.shadowBlur  = 6;
        ctx.moveTo(near[i].x, near[i].y);
        const SEGS = 5;
        for(let k=1;k<SEGS;k++){
          const t  = k/SEGS;
          const bx = near[i].x+(near[j].x-near[i].x)*t + (Math.random()-.5)*14;
          const by = near[i].y+(near[j].y-near[i].y)*t + (Math.random()-.5)*14;
          ctx.lineTo(bx, by);
        }
        ctx.lineTo(near[j].x, near[j].y);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

let frameCount = 0;
function animateCanvas() {
  ctx.clearRect(0, 0, W, H);
  frameCount++;
  if (frameCount % 3 === 0) drawHexGrid(); // draw hex every 3 frames
  particles.forEach(p => { p.update(); p.draw(); });
  connectParticles();
  drawArcs();
  requestAnimationFrame(animateCanvas);
}

resize();
for (let i = 0; i < 80; i++) particles.push(new Particle());
animateCanvas();
window.addEventListener('resize', () => { resize(); particles.forEach(p => p.init()); });

/* ─── CURSOR ─────────────────────────────────────────── */
const reticle = document.getElementById('curReticle');
const dot      = document.getElementById('curDot');
let mx=0, my=0, rx=0, ry=0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  mouse.x = mx; mouse.y = my;
  dot.style.left  = mx + 'px';
  dot.style.top   = my + 'px';
  document.getElementById('spotlight').style.background =
    `radial-gradient(circle 450px at ${mx}px ${my}px, rgba(0,229,255,.055) 0%, transparent 100%)`;
});

/* Trail */
const T = 10;
const trails = Array.from({ length: T }, (_, i) => {
  const el = Object.assign(document.createElement('div'), { className: 'cur-trail' });
  el.style.opacity = ((T - i) / T * .38).toFixed(2);
  document.body.appendChild(el);
  return { el, x: 0, y: 0 };
});

(function loop() {
  rx += (mx - rx) * .1; ry += (my - ry) * .1;
  reticle.style.left = rx + 'px';
  reticle.style.top  = ry + 'px';
  let px = mx, py = my;
  trails.forEach((t, i) => {
    t.x += (px - t.x) * (.27 - i * .02);
    t.y += (py - t.y) * (.27 - i * .02);
    t.el.style.left      = t.x + 'px';
    t.el.style.top       = t.y + 'px';
    t.el.style.transform = `translate(-50%,-50%) scale(${1 - i * .085})`;
    px = t.x; py = t.y;
  });
  requestAnimationFrame(loop);
})();

document.querySelectorAll('button, a, input, .step, .hud-c').forEach(el => {
  el.addEventListener('mouseenter', () => reticle.classList.add('hover'));
  el.addEventListener('mouseleave', () => reticle.classList.remove('hover'));
});
document.addEventListener('mousedown', () => { reticle.classList.add('pressing'); dot.classList.add('pressing'); });
document.addEventListener('mouseup',   () => { reticle.classList.remove('pressing'); dot.classList.remove('pressing'); });

/* ─── SHOCKWAVE ──────────────────────────────────────── */
document.addEventListener('click', e => {
  [null, 'd1', 'd2'].forEach(cls => {
    const w = document.createElement('div');
    w.className = cls ? `shockwave ${cls}` : 'shockwave';
    w.style.left = e.clientX + 'px';
    w.style.top  = e.clientY + 'px';
    document.body.appendChild(w);
    setTimeout(() => w.remove(), 800);
  });
});

/* ─── 3D TILT + HOLOGRAPHIC SHINE ───────────────────── */
const card  = document.getElementById('statusCard');
const shine = document.getElementById('cardShine');
let tiltOn  = true;

card.addEventListener('mousemove', e => {
  if (!tiltOn) return;
  const r  = card.getBoundingClientRect();
  const x  = (e.clientX - r.left) / r.width  - .5;
  const y  = (e.clientY - r.top)  / r.height - .5;
  card.style.transform = `perspective(750px) rotateX(${-y * 10}deg) rotateY(${x * 10}deg) translateZ(16px)`;

  // Holographic shine: angle-based gradient
  const angle = Math.atan2(y, x) * (180 / Math.PI);
  shine.style.opacity = '1';
  shine.style.background = `
    radial-gradient(circle at ${(x+.5)*100}% ${(y+.5)*100}%, rgba(255,255,255,.13), transparent 55%),
    linear-gradient(${angle}deg, rgba(0,229,255,.06), rgba(123,97,255,.06), rgba(255,61,113,.04), transparent)
  `;
});

card.addEventListener('mouseleave', () => {
  card.style.transform  = '';
  shine.style.opacity   = '0';
  card.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
  setTimeout(() => card.style.transition = '', 500);
});

/* ─── MAGNETIC BUTTON ────────────────────────────────── */
const btnWrap = document.getElementById('btnWrap');
btnWrap.addEventListener('mousemove', e => {
  const r  = btnWrap.getBoundingClientRect();
  const dx = e.clientX - (r.left + r.width / 2);
  const dy = e.clientY - (r.top  + r.height / 2);
  btnWrap.style.transform = `translate(${dx * .2}px, ${dy * .2}px)`;
});
btnWrap.addEventListener('mouseleave', () => {
  btnWrap.style.transform = '';
  btnWrap.style.transition = 'transform .45s cubic-bezier(.34,1.56,.64,1)';
  setTimeout(() => btnWrap.style.transition = '', 450);
});

/* ─── GLITCH TITLE ───────────────────────────────────── */
const GLYPHS = '!<>-_\\/[]{}—=+*^?#@$%░▒▓';
const titleEl = document.getElementById('mainTitle');
const ORIG    = 'Android Auditor';

function glitch(text, el, ms = 850) {
  const t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / ms, 1);
    el.textContent = text.split('').map((c, i) =>
      c === ' ' ? ' ' : i / text.length < p ? c : GLYPHS[Math.floor(Math.random() * GLYPHS.length)]
    ).join('');
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = text;
  })(t0);
}

titleEl.addEventListener('mouseenter', () => glitch(ORIG, titleEl));
setInterval(() => glitch(ORIG, titleEl, 600), 9000);

/* ─── TYPEWRITER ─────────────────────────────────────── */
const SUBTITLE = 'ADB · SECURITY INTELLIGENCE PLATFORM';
const subEl = document.getElementById('subtitle');
let ti = 0;
function typeNext() {
  if (ti <= SUBTITLE.length) {
    subEl.textContent = SUBTITLE.slice(0, ti) + (ti < SUBTITLE.length ? '_' : '');
    ti++;
    setTimeout(typeNext, 55);
  }
}
setTimeout(typeNext, 600);

/* ─── CLOCK IN STATUS BAR ────────────────────────────── */
function updateClock() {
  const now = new Date();
  document.getElementById('sysTime').textContent =
    now.toLocaleTimeString('en-US', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

/* ─── DEVICE CHECK ───────────────────────────────────── */
let progCount = 0;

async function checkDevice() {
  try {
    const r = await fetch('/api/check-device');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const msg = document.getElementById('statusMsg');
    const btn = document.getElementById('scanBtn');
    const row = document.getElementById('deviceStatus');

    if (d.connected) {
      dot.className     = 'status-dot connected';
      msg.innerHTML     = `Authorized — <strong>${d.device_line || 'Android Device'}</strong>`;
      btn.disabled      = false;
      row.className     = 'device-row found';
      document.getElementById('sysDev').textContent = 'LINKED';

      // Trigger scan beam on card
      const beam = document.createElement('div');
      beam.className = 'scan-beam';
      card.appendChild(beam);
      setTimeout(() => beam.remove(), 800);
    } else {
      dot.className     = 'status-dot disconnected';
      msg.textContent   = d.error || 'No device — connect via USB & authorize';
      btn.disabled      = true;
      row.className     = 'device-row missing';
      document.getElementById('sysDev').textContent = 'NONE';
      setTimeout(checkDevice, 3000);
    }
  } catch(e) {
    document.getElementById('statusMsg').textContent = 'ADB service unreachable';
    document.getElementById('sysAdb').textContent    = 'ERROR';
  }
}

/* ─── START SCAN ─────────────────────────────────────── */
async function startScan() {
  const btn = document.getElementById('scanBtn');
  const txt = document.getElementById('btnText');

  btn.disabled = true;
  btn.classList.add('scanning');
  txt.textContent = '◉ SCANNING DEVICE…';
  tiltOn = false;

  document.getElementById('progressWrap').classList.add('active');
  document.getElementById('progLog').innerHTML = '';
  progCount = 0;

  await fetch('/api/start-audit');

  const evtSrc = new EventSource('/api/progress');
  evtSrc.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.msg === '__DONE__') {
      evtSrc.close();
      document.getElementById('progBar').style.width = '100%';
      setTimeout(() => window.location.href = '/report', 600);
      return;
    }
    progCount++;
    const line = document.createElement('div');
    line.className = 'log-line ' + (
      data.msg.toLowerCase().includes('error') || data.msg.toLowerCase().includes('fail') ? 'warn' :
      data.msg.toLowerCase().includes('done')  || data.msg.toLowerCase().includes('complete') ? 'ok' : 'info'
    );
    line.textContent = data.msg;
    const log = document.getElementById('progLog');
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    document.getElementById('progBar').style.width = Math.min(95, progCount * .9) + '%';
  };
}


/* ─── CROSSHAIR + HUD ────────────────────────────── */
const chH = document.getElementById('chH');
const chV = document.getElementById('chV');
const curHud = document.getElementById('curHud');
const hudX = document.getElementById('hudX');
const hudY = document.getElementById('hudY');

document.addEventListener('mousemove', e => {
  chH.style.top  = e.clientY + 'px';
  chV.style.left = e.clientX + 'px';

  // HUD position
  curHud.style.left = e.clientX + 'px';
  curHud.style.top  = e.clientY + 'px';
  hudX.textContent  = 'X:' + String(e.clientX).padStart(4,'0');
  hudY.textContent  = 'Y:' + String(e.clientY).padStart(4,'0');
});

/* ─── CURSOR VELOCITY TINT ────────────────────────── */
(function velTrack(){
  let lx=0, ly=0, vDot=document.getElementById('curDot');
  setInterval(()=>{
    const spd = Math.hypot(mx-lx, my-ly);
    if(spd > 12) {
      vDot.style.background   = `hsl(${Math.max(160,200-spd*2)},100%,60%)`;
      vDot.style.boxShadow    = `0 0 ${6+spd*.3}px hsl(${Math.max(160,200-spd*2)},100%,60%)`;
    } else {
      vDot.style.background   = 'var(--accent)';
      vDot.style.boxShadow    = '0 0 6px var(--accent)';
    }
    lx=mx; ly=my;
  }, 40);
})();

/* ─── BUTTON CORNER BRACKETS ─────────────────────── */
document.querySelectorAll('.btn-wrap').forEach(wrap => {
  if(!wrap.querySelector('.btn-brackets')) {
    const b = document.createElement('div');
    b.className = 'btn-brackets';
    b.innerHTML = '<span></span><span></span><span></span><span></span>';
    wrap.appendChild(b);
  }
});


checkDevice();
</script>
